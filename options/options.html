<!doctype html>
<html lang="en" data-i18n-title="settingsTitle">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EnvMate Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1 data-i18n="settingsTitle">EnvMate Settings</h1>
          <p data-i18n="settingsSubtitle">Manage environment marks and test accounts without editing JSON.</p>
        </div>
        <div class="actions">
          <button id="load-sample" type="button" data-i18n="loadSample">Load Sample</button>
          <button id="export-config" type="button" data-i18n="export">Export</button>
          <label class="file-button">
            <span data-i18n="import">Import</span>
            <input id="import-config" type="file" accept="application/json,.json" />
          </label>
        </div>
      </header>

      <section class="layout">
        <aside class="panel">
          <div class="panel__head">
            <h2 data-i18n="environments">Environments</h2>
            <div class="panel__actions">
              <button id="add-group" class="small-button" type="button" data-i18n="addGroup">Add Group</button>
            </div>
          </div>
          <div id="environment-list" class="environment-list"></div>
        </aside>

        <section class="workspace">
          <div class="status-bar">
            <div id="status" class="status" data-i18n="ready">Ready</div>
          </div>

          <div class="workspace-shell">
            <form id="environment-form" class="form">
              <section id="section-basic" class="form-section">
              <div class="section-title">
                <h2 data-i18n="basic">Basic</h2>
              </div>
              <div class="field-grid">
                <label class="field">
                  <span data-i18n="name">Name</span>
                  <input id="env-name" type="text" placeholder="Test Environment" data-i18n-placeholder="envNamePlaceholder" />
                </label>
                <label class="field">
                  <span data-i18n="group">Group</span>
                  <select id="env-group"></select>
                </label>
              </div>
              </section>

              <section id="section-rules" class="form-section">
              <div class="section-title">
                <h2 data-i18n="urlRules">URL Rules</h2>
                <button id="add-rule" class="small-button" type="button" data-i18n="addRule">Add Rule</button>
              </div>
              <div id="rules-list" class="stack-list"></div>
              </section>

              <section id="section-badge" class="form-section">
              <div class="section-title">
                <h2 data-i18n="badgeConfig">Badge Config</h2>
                <button id="preview-marker" class="small-button" type="button" data-i18n="previewMarker">Preview</button>
              </div>
              <label class="check-field">
                <input id="env-badge-enabled" type="checkbox" />
                <span data-i18n="badgeEnabled">Enable badge</span>
              </label>
              <label class="check-field">
                <input id="env-title-prefix" type="checkbox" />
                <span data-i18n="titlePrefix">Prefix page title with badge</span>
              </label>
              <div class="field-grid">
                <label class="field">
                  <span data-i18n="badgeText">Badge Text</span>
                  <input id="env-badge" type="text" />
                </label>
                <label class="field">
                  <span data-i18n="badgeColor">Badge Color</span>
                  <div class="color-field">
                    <div id="badge-color-swatches" class="color-swatches"></div>
                    <input id="badge-color" type="color" />
                  </div>
                </label>
                <label class="field">
                  <span data-i18n="badgeTextColor">Badge Text Color</span>
                  <div class="color-field">
                    <div id="badge-text-color-swatches" class="color-swatches"></div>
                    <input id="badge-text-color" type="color" />
                  </div>
                </label>
                <label class="field">
                  <span data-i18n="badgeStyle">Badge Style</span>
                  <select id="badge-style">
                    <option value="pill" data-i18n="badgeStylePill">Pill</option>
                    <option value="slanted" data-i18n="badgeStyleSlanted">Slanted</option>
                  </select>
                </label>
                <label class="field">
                  <span data-i18n="badgePosition">Badge Position</span>
                  <select id="badge-position">
                    <option value="top-right" data-i18n="topRight">Top Right</option>
                    <option value="top-left" data-i18n="topLeft">Top Left</option>
                    <option value="bottom-right" data-i18n="bottomRight">Bottom Right</option>
                    <option value="bottom-left" data-i18n="bottomLeft">Bottom Left</option>
                  </select>
                </label>
                <label class="field">
                  <span data-i18n="badgeSize">Badge Size</span>
                  <input id="badge-size" type="range" min="12" max="24" step="1" />
                </label>
                <label class="field">
                  <span data-i18n="badgeOffset">Badge Offset</span>
                  <input id="badge-offset" type="range" min="0" max="48" step="1" />
                </label>
                <label class="field">
                  <span data-i18n="badgeOpacity">Badge Opacity</span>
                  <input id="badge-opacity" type="range" min="0.35" max="1" step="0.05" />
                </label>
              </div>
              <div class="marker-preview">
                <div class="marker-preview__head">
                  <span data-i18n="badgePreview">Badge Preview</span>
                </div>
                <div id="badge-preview-surface" class="marker-preview__surface"></div>
              </div>
              </section>

              <section id="section-watermark" class="form-section">
              <div class="section-title">
                <h2 data-i18n="watermarkConfig">Watermark Config</h2>
              </div>
              <label class="check-field">
                <input id="env-watermark-enabled" type="checkbox" />
                <span data-i18n="watermarkEnabled">Enable watermark</span>
              </label>
              <div class="field-grid">
                <label class="field">
                  <span data-i18n="watermarkText">Watermark Text</span>
                  <input id="env-watermark-text" type="text" />
                </label>
                <label class="field">
                  <span data-i18n="watermarkColor">Watermark Color</span>
                  <div class="color-field">
                    <div id="watermark-color-swatches" class="color-swatches"></div>
                    <input id="watermark-color" type="color" />
                  </div>
                </label>
                <label class="field">
                  <span data-i18n="watermarkOpacity">Watermark Opacity</span>
                  <input id="watermark-opacity" type="range" min="0.02" max="0.2" step="0.01" />
                </label>
                <label class="field">
                  <span data-i18n="watermarkAngle">Watermark Angle</span>
                  <input id="watermark-angle" type="range" min="-45" max="0" step="1" />
                </label>
                <label class="field">
                  <span data-i18n="watermarkSize">Watermark Size</span>
                  <input id="watermark-size" type="range" min="20" max="72" step="1" />
                </label>
                <label class="field">
                  <span data-i18n="watermarkGap">Watermark Gap</span>
                  <input id="watermark-gap" type="range" min="32" max="140" step="4" />
                </label>
              </div>
              <div class="marker-preview">
                <div class="marker-preview__head">
                  <span data-i18n="watermarkPreview">Watermark Preview</span>
                </div>
                <div id="watermark-preview-surface" class="marker-preview__surface"></div>
              </div>
              </section>

              <section id="section-accounts" class="form-section">
              <div class="section-title">
                <h2 data-i18n="testAccounts">Test Accounts</h2>
                <button id="add-account" class="small-button" type="button" data-i18n="addAccount">Add Account</button>
              </div>
              <div id="accounts-list" class="stack-list"></div>
              </section>
            </form>
            <aside id="workspace-toolbox" class="workspace-toolbox">
              <section class="workspace-toolbox__card">
                <div class="workspace-toolbox__title" data-i18n="quickNav">Quick Navigation</div>
                <div class="workspace-toolbox__nav">
                  <button type="button" class="workspace-toolbox__nav-button" data-scroll-target="section-basic" data-i18n="basic">Basic</button>
                  <button type="button" class="workspace-toolbox__nav-button" data-scroll-target="section-rules" data-i18n="urlRules">URL Rules</button>
                  <button type="button" class="workspace-toolbox__nav-button" data-scroll-target="section-badge" data-i18n="badgeConfig">Badge Config</button>
                  <button type="button" class="workspace-toolbox__nav-button" data-scroll-target="section-watermark" data-i18n="watermarkConfig">Watermark Config</button>
                  <button type="button" class="workspace-toolbox__nav-button" data-scroll-target="section-accounts" data-i18n="testAccounts">Test Accounts</button>
                </div>
              </section>

              <section class="workspace-toolbox__card">
                <div class="workspace-toolbox__title" data-i18n="workspaceActions">Environment Actions</div>
                <div class="workspace-toolbox__actions">
                  <button id="save-config" class="primary workspace-toolbox__action-button" type="button" data-i18n="save">Save</button>
                  <label class="workspace-toolbox__toggle-row toggle-control" data-i18n-title="environmentEnabled">
                    <input id="env-enabled" type="checkbox" />
                    <span class="toggle-control__switch" aria-hidden="true"></span>
                    <span id="env-enabled-label" data-i18n="environmentEnabledOn">Environment enabled</span>
                  </label>
                  <button id="delete-environment" class="danger-button workspace-toolbox__action-button" type="button" data-i18n="deleteEnvironment">Delete Environment</button>
                </div>
              </section>
            </aside>
          </div>
        </section>
      </section>
    </main>

    <script src="../src/i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
